name: Ping Hugging Face Space

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping-space:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          SPACE_URL: ${{ secrets.SPACE_URL }}
        run: |
          mkdir -p artifacts/logs artifacts/screenshots
          node scripts/monitor_space.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-space-monitor
          path: artifacts/
          retention-days: 30
